<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francesco Abate</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --amber: #D4832A;
    --amber-light: #E8963A;
    --cream: #FAF6F0;
    --dark: #1A1208;
    --dark2: #241A0E;
    --card: #2E2112;
    --card2: #F5EDE0;
    --border: rgba(212,131,42,0.18);
    --text: #1A1208;
    --muted: #8C7355;
    --warm-white: #FAF6F0;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px 48px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(212,131,42,0.10) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  .avatar-wrap {
    position: relative;
    margin-bottom: 18px;
    animation: fadeDown 0.6s ease both;
  }
  .avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
    z-index: 1;
    border: 3px solid var(--amber);
    box-shadow: 0 4px 24px rgba(212,131,42,0.18);
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .avatar-ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    background: conic-gradient(var(--amber), rgba(212,131,42,0.1) 50%, var(--amber));
    animation: spin 5s linear infinite;
    z-index: 0;
  }
  .avatar-ring::before {
    content: '';
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background: var(--cream);
  }
  .name {
    font-family: 'Syne', sans-serif;
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-align: center;
    margin-bottom: 4px;
    color: var(--dark);
    animation: fadeDown 0.6s 0.1s ease both;
  }
  .handle {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.3px;
    margin-bottom: 8px;
    animation: fadeDown 0.6s 0.15s ease both;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(212,131,42,0.10);
    border: 1px solid rgba(212,131,42,0.22);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--amber);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 32px;
    animation: fadeDown 0.6s 0.2s ease both;
  }
  .badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--amber);
    animation: pulse 1.5s ease infinite;
  }
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 17px 18px;
    border-radius: 16px;
    text-decoration: none;
    color: var(--text);
    border: 1px solid var(--border);
    transition: all 0.22s ease;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .link-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(212,131,42,0.13); }
  .link-btn:active { transform: translateY(0); }
  .link-btn.primary {
    background: linear-gradient(135deg, #D4832A 0%, #C0701E 100%);
    border-color: transparent;
    color: #FAF6F0;
    box-shadow: 0 4px 18px rgba(212,131,42,0.28);
  }
  .link-btn.primary:hover { box-shadow: 0 8px 32px rgba(212,131,42,0.38); }
  .link-btn.primary .btn-icon { background: rgba(255,255,255,0.15); }
  .link-btn.primary .btn-title { color: #FAF6F0; }
  .link-btn.primary .btn-sub { color: rgba(250,246,240,0.65); }
  .link-btn.primary .arrow { color: rgba(250,246,240,0.5); }
  .link-btn.secondary {
    background: var(--card2);
    border: 1px solid rgba(212,131,42,0.14);
  }
  .link-btn.secondary:hover { border-color: rgba(212,131,42,0.3); }
  .link-btn.secondary .btn-icon { background: rgba(212,131,42,0.10); color: var(--amber); }
  .btn-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .btn-text {
    flex: 1;
    position: relative;
    z-index: 1;
  }
  .btn-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: -0.2px;
    margin-bottom: 2px;
    color: var(--dark);
  }
  .btn-sub {
    font-size: 11.5px;
    color: var(--muted);
    font-weight: 400;
    line-height: 1.4;
  }
  .arrow {
    font-size: 16px;
    color: var(--muted);
    position: relative;
    z-index: 1;
    transition: transform 0.2s ease;
  }
  .link-btn:hover .arrow { transform: translateX(3px); }
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    margin: 2px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(212,131,42,0.15);
  }
  .divider span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .footer {
    margin-top: 28px;
    text-align: center;
    animation: fadeUp 0.6s 0.5s ease both;
  }
  .footer p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }
  .footer strong { color: var(--amber); }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.75); }
  }
  .link-btn:nth-child(1) { animation: fadeUp 0.5s 0.25s ease both; }
  .link-btn:nth-child(3) { animation: fadeUp 0.5s 0.35s ease both; }
  .divider { animation: fadeUp 0.5s 0.3s ease both; }
</style>
</head>
